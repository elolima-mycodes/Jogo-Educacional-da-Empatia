<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminho da Empatia</title>
    <style>
        /* Variáveis de Cores */
        :root {
            --cinza: #A0AEC0;
            --coral: #FF6B6B;
            --turquesa: #4ECDC4;
            --amarelo-sol: #FFE66D;
            --off-white: #F0F4F8;
            --text-dark: #2D3748;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--off-white);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Top Bar & Progresso */
        .header {
            width: 100%;
            padding: 20px;
            background: white;
            box-shadow: 0 4px 15px rgba(160, 174, 192, 0.15);
            /* Soft shadow with slate grey */
            border-bottom: 3px solid var(--off-white);
            /* Bottom border using off-white */
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        #points {
            color: var(--coral);
            font-weight: bold;
            font-size: 1.05rem;
        }

        .progress-container {
            width: 80%;
            max-width: 500px;
            height: 20px;
            background-color: var(--off-white);
            border-radius: 10px;
            margin: 0 auto;
            overflow: hidden;
            border: 2px solid var(--cinza);
            /* Using slate grey for the container border */
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--coral);
            transition: width 0.5s ease;
        }

        /* Palco Principal */
        #game-container {
            flex: 1;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .scene {
            width: 100%;
            height: 450px;
            border-radius: 20px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            border: 8px solid white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease;
        }

        /* Personagem */
        .character-wrapper {
            cursor: pointer;
            transition: transform 0.3s ease;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 80%;
            display: flex;
            justify-content: center;
        }

        .character-wrapper:hover {
            transform: translateX(-50%) scale(1.03);
        }

        .npc-image {
            max-height: 350px;
            width: auto;
            display: block;
            transition: filter 0.5s ease;
        }

        /* O filtro de cinza só é aplicado na versão triste via CSS */
        .sad-filter {
            filter: grayscale(100%);
        }

        .happy-filter {
            filter: grayscale(0%);
        }

        /* Navegação de Salas */
        .nav-menu {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }

        .nav-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            background-color: white;
            color: var(--text-dark);
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--cinza);
            /* Using slate grey instead of hardcoded hex */
            transition: all 0.2s;
        }

        .nav-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--cinza);
            /* Using slate grey instead of hardcoded hex */
        }

        .nav-btn.active {
            background-color: var(--turquesa);
            color: white;
            box-shadow: 0 4px 0 #3baba2;
            /* Darker turquoise matching the official palette */
        }

        /* Modal / Caixa de Diálogo */
        #modal-overlay,
        #final-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(45, 55, 72, 0.65);
            /* Using slate grey / text dark for overlay */
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal {
            background: white;
            padding: 35px;
            border-radius: 25px;
            border: 4px solid var(--off-white);
            /* Premium border using off-white */
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 30px rgba(45, 55, 72, 0.2);
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            margin-bottom: 15px;
            color: var(--coral);
        }

        .choice-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .choice-btn {
            padding: 15px;
            border-radius: 15px;
            background: var(--off-white);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            color: var(--text-dark);
            text-align: center;
            font-weight: 600;
        }

        #btn-empatico {
            border: 2px solid var(--turquesa); /* Uses --turquesa for positive/empathetic choice */
        }

        #btn-empatico:hover {
            background: rgba(78, 205, 196, 0.12); /* Opacity of official --turquesa */
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(78, 205, 196, 0.15);
        }

        #btn-indiferente {
            border: 2px solid var(--cinza); /* Uses --cinza for secondary/indifferent choice */
            color: #5a6474;
        }

        #btn-indiferente:hover {
            background: rgba(160, 174, 192, 0.12); /* Opacity of official --cinza */
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(160, 174, 192, 0.15);
        }

        #btn-restart:hover {
            background: rgba(255, 107, 107, 0.12) !important;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 107, 107, 0.15);
        }

        #feedback-msg {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            font-weight: bold;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error {
            background-color: rgba(255, 230, 109, 0.22); /* Official --amarelo-sol with opacity for teaching hints */
            color: #7d6608;
            border: 2px solid var(--amarelo-sol);
        }

        .success {
            background-color: rgba(78, 205, 196, 0.12); /* Official --turquesa with opacity */
            color: #2d736e;
            border: 2px solid var(--turquesa);
        }

        #btn-close {
            margin-top: 20px;
            display: none;
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            background-color: var(--turquesa);
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #3baba2;
            /* Darker turquoise matching the official palette */
            transition: all 0.2s;
        }

        #btn-close:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #3baba2;
        }

        @media (max-width: 600px) {
            .scene {
                height: 350px;
            }

            .npc-image {
                max-height: 250px;
            }

            .nav-menu {
                gap: 6px;
                padding: 5px 0;
                width: 100%;
            }

            .nav-btn {
                padding: 8px 10px;
                font-size: 0.78rem;
                border-radius: 20px;
                box-shadow: 0 3px 0 var(--cinza);
                /* Using slate grey instead of hardcoded hex */
                flex: 1;
                text-align: center;
                white-space: nowrap;
            }

            .nav-btn:active {
                transform: translateY(1.5px);
                box-shadow: 0 1.5px 0 var(--cinza);
                /* Using slate grey instead of hardcoded hex */
            }

            .nav-btn.active {
                box-shadow: 0 3px 0 #3baba2;
                /* Darker turquoise matching the official palette */
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Nível de Empatia da Escola</h1>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <p style="margin-top: 5px; font-size: 0.95rem; font-weight: bold; color: var(--text-dark);">
            Empatia: <span id="points">0</span>/4 <span style="color: var(--amarelo-sol); font-size: 1.1rem; vertical-align: middle;">⭐</span>
        </p>
    </div>

    <div id="game-container">
        <h2 id="location-name" style="margin-bottom: 15px; color: var(--cinza);">Carregando...</h2>

        <div id="main-scene" class="scene">
            <div id="npc-trigger" class="character-wrapper">
                <!-- Imagem do NPC que muda via JavaScript -->
                <img id="npc-img" src="" alt="NPC" class="npc-image">
            </div>
        </div>

        <div class="nav-menu">
            <button class="nav-btn active" onclick="changeLocation('patio')">Pátio</button>
            <button class="nav-btn" onclick="changeLocation('cantina')">Cantina</button>
            <button class="nav-btn" onclick="changeLocation('biblioteca')">Biblioteca</button>
            <button class="nav-btn" onclick="changeLocation('secretaria')">Secretaria</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h2 id="npc-name">Personagem</h2>
            <p id="npc-problem">Problema...</p>
            <div class="choice-container">
                <button id="btn-empatico" class="choice-btn">Opção Empática</button>
                <button id="btn-indiferente" class="choice-btn">Opção Indiferente</button>
            </div>
            <div id="feedback-msg"></div>
            <button id="btn-close">Continuar</button>
        </div>
    </div>

    <!-- Modal de Sucesso Final -->
    <div id="final-modal-overlay">
        <div class="modal" style="border-color: var(--turquesa);">
            <h2 style="color: var(--turquesa); font-size: 1.8rem; margin-bottom: 15px;"> Missão Cumprida!</h2>
            <p style="font-size: 1.05rem; margin-bottom: 20px; line-height: 1.6; color: var(--text-dark);">
                Incrível! Você completou sua missão de empatia e transformou toda a escola em um lugar mais acolhedor,
                colorido e feliz!
            </p>
            <button id="btn-restart" class="choice-btn"
                style="width: 100%; border-color: var(--coral); background-color: var(--off-white); font-weight: bold; color: var(--text-dark); transition: all 0.2s;">
                Jogar Novamente
            </button>
        </div>
    </div>

    <script>
        /**
         * GUIA DE SUBSTITUIÇÃO DE IMAGENS:
         * Substitua os links abaixo (ex: 'url-da-imagem.png') pelos seus links reais.
         */
        const gameData = {
            patio: {
                name: "Sr. Jorge",
                location: "Pátio da Escola",
                // CENÁRIO:
                bg: "imgs/patio.png",
                // PERSONAGENS:
                imgTriste: "imgs/npc1-sr-jorge-comeco.png",
                imgFeliz: "imgs/npc1-sr-jorge-final.png",
                problem: "Olá... às vezes sinto que sou invisível aqui. Passo o dia limpando e parece que ninguém nota o meu esforço para manter a escola agradável.",
                empatico: "Dar um sorriso e dizer: 'Obrigado pelo seu trabalho, Sr. Jorge! A escola está ótima graças ao senhor'.",
                indiferente: "Apenas passar direto, afinal, limpar a escola é a obrigação dele.",
                hint: "Dica: Reconhecer o trabalho dos outros é o primeiro passo para a visibilidade social.",
                consequence: "Obrigado por me notar! Sinto-me muito mais motivado agora para deixar tudo brilhando."
            },
            cantina: {
                name: "Pedro",
                location: "Cantina",
                // CENÁRIO:
                bg: "imgs/cantina.png",
                // PERSONAGENS:
                imgTriste: "imgs/npc2-pedro-comeco.png",
                imgFeliz: "imgs/npc2-pedro-final.png",
                problem: "Ah, não... meu lanche caiu todo no chão! Agora vou ter que ficar com fome até o final das aulas...",
                empatico: "Sentar-se ao lado dele e dizer: 'Ei, não fica assim! Eu tenho comida sobrando, quer dividir comigo?'",
                indiferente: "Dizer: 'Puxa, que azar! Da próxima vez segura o prato com mais cuidado'.",
                hint: "Dica: Empatia é se colocar no lugar do outro e oferecer apoio em momentos de perda.",
                consequence: "Valeu mesmo por dividir seu lanche! Você salvou o meu dia!"
            },
            biblioteca: {
                name: "Léo",
                location: "Biblioteca",
                // CENÁRIO:
                bg: "imgs/biblioteca.png",
                // PERSONAGENS:
                imgTriste: "imgs/npc3-leo-comeco.png",
                imgFeliz: "imgs/npc3-leo-final.png",
                problem: "É difícil... as pessoas ou me ignoram ou me olham com cara de pena. Eu só queria conversar normalmente sobre coisas que eu gosto.",
                empatico: "Chegar perto com naturalidade e perguntar: 'Oi Léo! Tem algum livro bom para me recomendar?'",
                indiferente: "Ficar apontando de longe e comentar com um amigo: 'Nossa, deve ser tão difícil a vida dele'.",
                hint: "Dica: Trate as pessoas com naturalidade. O interesse genuíno aproxima mais do que a pena.",
                consequence: "Foi muito legal conversar com você! Podemos conversar mais sobre livros depois."
            },
            secretaria: {
                name: "Sr. Arnaldo",
                location: "Secretaria",
                // CENÁRIO:
                bg: "imgs/secretaria.png",
                // PERSONAGENS:
                imgTriste: "imgs/npc4-arnaldo-comeco.png",
                imgFeliz: "imgs/npc4-arnaldo-final.png",
                problem: "Telefone tocando, pilhas de documentos... as pessoas entram aqui, exigem papéis e nem olham na minha cara. Sinto que sou apenas uma máquina.",
                empatico: "Esperar pacientemente ele desligar o telefone, dar um 'Bom dia' gentil e perguntar se ele precisa de ajuda.",
                indiferente: "Bater no balcão enquanto ele fala ao telefone para mostrar que você está com pressa.",
                hint: "Dica: Gentileza e paciência humanizam os ambientes de trabalho sob pressão.",
                consequence: "Obrigado pela paciência e pelo 'bom dia'. Faz toda a diferença ser tratado com respeito no meio da correria."
            }
        };

        let currentLoc = 'patio';
        let solved = { patio: false, cantina: false, biblioteca: false, secretaria: false };
        let points = 0;

        const mainScene = document.getElementById('main-scene');
        const npcImg = document.getElementById('npc-img');
        const modal = document.getElementById('modal-overlay');
        const progressBar = document.getElementById('progress-bar');
        const pointsDisplay = document.getElementById('points');
        const feedbackMsg = document.getElementById('feedback-msg');
        const btnClose = document.getElementById('btn-close');

        function changeLocation(loc) {
            currentLoc = loc;
            const data = gameData[loc];

            // Atualiza Título e Cenário
            document.getElementById('location-name').innerText = data.location;
            mainScene.style.backgroundImage = `url('${data.bg}')`;

            // Atualiza Botões
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === loc);
            });

            updateNPC();
        }

        function updateNPC() {
            const data = gameData[currentLoc];
            const isSolved = solved[currentLoc];

            if (isSolved) {
                npcImg.src = data.imgFeliz;
                npcImg.className = "npc-image happy-filter";
            } else {
                npcImg.src = data.imgTriste;
                npcImg.className = "npc-image sad-filter";
            }
        }

        document.getElementById('npc-trigger').onclick = () => {
            const data = gameData[currentLoc];
            document.getElementById('npc-name').innerText = data.name;

            feedbackMsg.style.display = 'none';

            if (solved[currentLoc]) {
                document.getElementById('npc-problem').innerText = data.consequence;
                document.querySelector('.choice-container').style.display = 'none';
                btnClose.style.display = 'inline-block';
            } else {
                document.getElementById('npc-problem').innerText = data.problem;
                document.getElementById('btn-empatico').innerText = data.empatico;
                document.getElementById('btn-indiferente').innerText = data.indiferente;
                document.querySelector('.choice-container').style.display = 'flex';
                btnClose.style.display = 'none';
            }

            modal.style.display = 'flex';
        };

        document.getElementById('btn-empatico').onclick = () => {
            solved[currentLoc] = true;
            points++;

            pointsDisplay.innerText = points;
            progressBar.style.width = (points / 4) * 100 + "%";

            document.getElementById('npc-problem').innerText = gameData[currentLoc].consequence;
            feedbackMsg.innerText = "Excelente! Sua empatia trouxe cor e alegria!";
            feedbackMsg.className = "success";
            feedbackMsg.style.display = 'block';

            document.querySelector('.choice-container').style.display = 'none';
            btnClose.style.display = 'inline-block';

            updateNPC();

            if (points === 4) {
                setTimeout(() => {
                    modal.style.display = 'none';
                    document.getElementById('final-modal-overlay').style.display = 'flex';
                }, 1000);
            }
        };

        document.getElementById('btn-indiferente').onclick = () => {
            feedbackMsg.innerText = gameData[currentLoc].hint;
            feedbackMsg.className = "error";
            feedbackMsg.style.display = 'block';
        };

        btnClose.onclick = () => modal.style.display = 'none';

        document.getElementById('btn-restart').onclick = () => {
            points = 0;
            pointsDisplay.innerText = points;
            progressBar.style.width = "0%";
            solved = { patio: false, cantina: false, biblioteca: false, secretaria: false };
            document.getElementById('final-modal-overlay').style.display = 'none';
            changeLocation('patio');
        };

        window.onload = () => changeLocation('patio');

    </script>
</body>

</html>
